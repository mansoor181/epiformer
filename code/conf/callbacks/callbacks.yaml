early_stopping:
  patience: 10
  min_delta: 1e-4
  # monitor: "val_loss"
  mode: "min"

model_checkpoint:
  # dirpath: ${hydra:runtime.cwd}/../../../../results/hgraphepi/m3epi/ablation
  dirpath: data/results/epiformer/checkpoints
  filename: "model-{epoch:02d}-{val_loss:.2f}"
  monitor: "val_loss"
  mode: "min"
  save_top_k: 1
  
checkpoint_interval: 5  # Save every 5 epochs


  
sweep:
  out_dir: ${hydra:runtime.cwd}/../../../../results/hgraphepi/m3epi/sweep


